<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URLShelf | Edit Page</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      header {
        align-items: baseline;
      }
      .actions {
        justify-content: space-between;
        gap: 12px;
      }
      @media (max-width: 640px) {
        .actions {
          flex-direction: column-reverse;
        }
        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="brand">
          <img class="logo" src="/static/logo.svg" alt="URLShelf logo" />
          <div>
            <h1>Edit Page</h1>
            <p>Update the URL, content, and format.</p>
          </div>
        </div>
        <div>
          <a class="btn btn-ghost" href="/manage">Back to Manage</a>
        </div>
      </header>

      <section class="panel">
        <form method="post" action="/update">
          <input type="hidden" name="original_scheme" value="{{ scheme }}" />
          <input type="hidden" name="original_host" value="{{ host }}" />
          <input type="hidden" name="original_path" value="{{ path }}" />
          <div class="row">
            <label>URL</label>
            <input type="url" name="url" value="{{ url }}" required />
          </div>
          <div class="row">
            <label>Content</label>
            <textarea name="content" required>{{ content_raw }}</textarea>
          </div>
          <div class="row">
            <label>Format</label>
            <div class="radio-group">
              <label class="radio-card">
                <input type="radio" name="content_type" value="markdown" {% if content_type == 'markdown' %}checked{% endif %} />
                <div>
                  <strong>Markdown</strong>
                </div>
              </label>
              <label class="radio-card">
                <input type="radio" name="content_type" value="html" {% if content_type == 'html' %}checked{% endif %} />
                <div>
                  <strong>HTML</strong>
                </div>
              </label>
            </div>
          </div>
          <div class="actions">
            <a class="btn btn-ghost" href="/page/{{ scheme }}/{{ host }}{{ path }}">View Page</a>
            <button class="btn btn-primary" type="submit">Save Changes</button>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
