name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

env:
  COLUMNS: 120

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@v4

      - &setup_mise
        name: Setup mise
        uses: jdx/mise-action@v3

      - &uv_cache
        name: Setup uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - &pnpm_cache
        name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - &uv_sync
        name: Sync Python dependencies
        run: task -p build:install

      - &pnpm_install
        name: Install Node dependencies
        run: pnpm install

      - name: Run lint suite
        run: task -p lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - *checkout
      - *setup_mise
      - *uv_cache
      - *pnpm_cache
      - *uv_sync
      - *pnpm_install
      - name: Run tests
        run: task -p test
