<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URLShelf | Edit Page</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe9;
        --ink: #1f1a17;
        --muted: #6c5f55;
        --accent: #c25b3f;
        --accent-2: #2d6a73;
        --card: #fff7f0;
        --border: #e2d4c7;
        --shadow: 0 12px 30px rgba(31, 26, 23, 0.15);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Alegreya Sans", "Segoe UI", "Noto Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #f9e7d6 0, transparent 55%),
          radial-gradient(circle at 90% 0%, #dfe9e7 0, transparent 45%),
          var(--bg);
        min-height: 100vh;
      }
      .page {
        max-width: 960px;
        margin: 40px auto 64px;
        padding: 0 20px;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px 20px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo {
        width: 48px;
        height: 48px;
      }
      h1 {
        font-family: "Playfair Display", "Noto Serif", serif;
        font-size: clamp(2rem, 3vw, 2.7rem);
        letter-spacing: 0.02em;
        margin: 0;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .panel {
        background: linear-gradient(135deg, #fffaf5 0%, #fff1e5 100%);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 28px;
      }
      label { font-weight: 600; display: block; margin-bottom: 8px; }
      input, textarea, button {
        font-family: inherit;
        font-size: 1rem;
      }
      input[type="url"], textarea {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 14px 16px;
        background: #fffdfb;
        color: var(--ink);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      input[type="url"]:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(194, 91, 63, 0.2);
      }
      textarea { min-height: 240px; resize: vertical; }
      .row { margin-bottom: 18px; }
      .radio-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }
      .radio-card {
        position: relative;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #fffdfb;
        padding: 14px 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .radio-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 8px 18px rgba(31, 26, 23, 0.12);
      }
      .radio-card input {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid var(--muted);
        margin: 0;
        display: grid;
        place-items: center;
      }
      .radio-card input::after {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        transform: scale(0);
        transition: transform 0.2s ease;
      }
      .radio-card input:checked { border-color: var(--accent); }
      .radio-card input:checked::after { transform: scale(1); }
      .radio-card strong { display: block; }
      .radio-card span { color: var(--muted); font-size: 0.85rem; }
      .actions {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 22px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        border: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #e07b5f);
        color: #fff;
        box-shadow: 0 10px 18px rgba(194, 91, 63, 0.25);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 22px rgba(194, 91, 63, 0.3);
      }
      .btn-ghost {
        background: #fff;
        border: 1px solid var(--border);
        color: var(--ink);
      }
      @media (max-width: 640px) {
        .panel { padding: 20px; }
        .actions { flex-direction: column-reverse; }
        .btn { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="brand">
          <img class="logo" src="/static/logo.svg" alt="URLShelf logo" />
          <div>
            <h1>Edit Page</h1>
            <p>Update the URL, content, and format.</p>
          </div>
        </div>
        <div>
          <a class="btn btn-ghost" href="/manage">Back to Manage</a>
        </div>
      </header>

      <section class="panel">
        <form method="post" action="/update">
          <input type="hidden" name="original_scheme" value="{{ scheme }}" />
          <input type="hidden" name="original_host" value="{{ host }}" />
          <input type="hidden" name="original_path" value="{{ path }}" />
          <div class="row">
            <label>URL</label>
            <input type="url" name="url" value="{{ url }}" required />
          </div>
          <div class="row">
            <label>Content</label>
            <textarea name="content" required>{{ content_raw }}</textarea>
          </div>
          <div class="row">
            <label>Format</label>
            <div class="radio-group">
              <label class="radio-card">
                <input type="radio" name="content_type" value="markdown" {% if content_type == 'markdown' %}checked{% endif %} />
                <div>
                  <strong>Markdown</strong>
                  <span>Text-first writing</span>
                </div>
              </label>
              <label class="radio-card">
                <input type="radio" name="content_type" value="html" {% if content_type == 'html' %}checked{% endif %} />
                <div>
                  <strong>HTML</strong>
                  <span>Layout-focused</span>
                </div>
              </label>
            </div>
          </div>
          <div class="actions">
            <a class="btn btn-ghost" href="/page/{{ scheme }}/{{ host }}{{ path }}">View Page</a>
            <button class="btn btn-primary" type="submit">Save Changes</button>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
