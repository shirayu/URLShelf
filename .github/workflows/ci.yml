name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

env:
  COLUMNS: 120
  MISE_LOCKED: "1"

permissions:
  contents: read
  actions: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - &setup_mise
        name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - &uv_cache
        name: Setup uv cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - &pnpm_cache
        name: Setup pnpm cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - &uv_sync
        name: Sync Python dependencies
        run: task -p build:install

      - &pnpm_install
        name: Install Node dependencies
        run: pnpm install

      - name: Run lint suite
        run: task -p lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - *checkout
      - *setup_mise
      - *uv_cache
      - *pnpm_cache
      - *uv_sync
      - *pnpm_install
      - name: Run tests
        run: task -p test
