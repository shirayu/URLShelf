---
version: '3'

includes:
  vars:
    taskfile: ./Taskfile.vars.yml

tasks:
  all:
    deps:
      - task: :build:install
      - ruff_format
      - ruff_fix

  ruff_format:
    desc: "Format Python code with ruff"
    cmds:
      - '{{.RUFF}} format --respect-gitignore'

  ruff_fix:
    desc: "Auto-fix Python lint issues with ruff"
    cmds:
      - '{{.RUFF}} check --fix --respect-gitignore'
