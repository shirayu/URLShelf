---
version: '3'

includes:
  vars:
    taskfile: ./Taskfile.vars.yml

tasks:
  all:
    deps:
      - task: :build:install
      - hadolint
      - typos
      - ruff_format_check
      - ruff_check
      - markdownlint
      - pyright

  hadolint:
    desc: "Lint Dockerfile with hadolint"
    cmds:
      - '{{.HADOLINT}} container/prod/Dockerfile'

  typos:
    desc: "Spell-check source files with typos"
    cmds:
      - '{{.TYPOS}}'

  ruff_format_check:
    desc: "Check formatting with ruff"
    cmds:
      - '{{.RUFF}} format --respect-gitignore --check'

  ruff_check:
    desc: "Lint Python code with ruff"
    cmds:
      - '{{.RUFF}} check --respect-gitignore'

  markdownlint:
    desc: "Lint Markdown files with markdownlint"
    cmds:
      - '{{.PNPM}} exec markdownlint-cli2 .'

  pyright:
    desc: "Type check with pyright"
    cmds:
      - '{{.PNPM}} exec pyright'
