name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

env:
  COLUMNS: 120
  MISE_LOCKED: "1"

permissions:
  contents: read
  actions: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - &setup_mise
        name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - &uv_cache
        name: Setup uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - &pnpm_cache
        name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - &uv_sync
        name: Sync Python dependencies
        run: task -p build:install

      - &pnpm_install
        name: Install Node dependencies
        run: pnpm install

      - name: Run lint suite
        run: task -p lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - *checkout
      - *setup_mise
      - *uv_cache
      - *pnpm_cache
      - *uv_sync
      - *pnpm_install
      - name: Run tests
        run: task -p test
