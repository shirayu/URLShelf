name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

env:
  COLUMNS: 120
  MISE_LOCKED: "1"

permissions:
  contents: read
  actions: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - &setup_mise
        name: Setup mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - &uv_cache
        name: Setup uv cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - &pnpm_cache
        name: Setup pnpm cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - &uv_sync
        name: Sync Python dependencies
        run: task -p build:install

      - &pnpm_install
        name: Install Node dependencies
        run: pnpm install

      - name: Run lint suite
        run: task -p lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - *checkout
      - *setup_mise
      - *uv_cache
      - *pnpm_cache
      - *uv_sync
      - *pnpm_install
      - name: Run tests
        run: task -p test
