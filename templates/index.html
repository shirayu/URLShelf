<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URLShelf</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <div class="brand">
          <img class="logo" src="/static/logo.svg" alt="URLShelf logo" />
          <div>
            <h1>URLShelf</h1>
            <p>Store Markdown and HTML as readable pages.</p>
          </div>
        </div>
        <div class="header-actions">
          <a href="/manage">{{ MANAGE_PAGES_LABEL }}</a>
        </div>
      </header>

      <section class="panel">
        <form method="post" action="/save">
          <div class="row">
            <label>URL</label>
            <input type="url" name="url" placeholder="https://example.com/path" required />
          </div>
          <div class="row">
            <label>Content</label>
            <textarea name="content" placeholder="Markdown or HTML" required></textarea>
          </div>
          <div class="row">
            <label>Format</label>
            <div class="radio-group">
              <label class="radio-card">
                <input type="radio" name="content_type" value="markdown" />
                <div>
                  <strong>Markdown</strong>
                </div>
              </label>
              <label class="radio-card">
                <input type="radio" name="content_type" value="html" checked />
                <div>
                  <strong>HTML</strong>
                </div>
              </label>
            </div>
          </div>
          <div class="actions">
            <button type="submit">Save</button>
          </div>
        </form>
      </section>

      <div class="list">
        <h2>{{ MANAGE_PAGES_LABEL }}</h2>
        {% include "_page_rows.html" %}
        <div class="list-footer">
          <a href="/manage">{{ MANAGE_PAGES_LABEL }}</a>
        </div>
      </div>
    </div>
  </body>
</html>
